services:
  app:
    build:
      context: .
      target: builder
    image: tuition-finder-server:dev
    container_name: tuition-finder-app
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      # Override host-targeted URIs from .env for the compose network.
      MONGO_URI: mongodb://mongo:27017/tuition_finder
      REDIS_URL: redis://redis:6379
    volumes:
      - ./:/app
      # Anonymous volume keeps the image's node_modules from being shadowed
      # by the bind mount above.
      - /app/node_modules
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

  mongo:
    image: mongo:7
    container_name: tuition-finder-mongo
    ports:
      # LAN-exposed per request. NO auth is configured on this instance —
      # anyone on the network can read/write the DB. Lock down before any
      # untrusted network use (see warning at bottom of file).
      - "27017:27017"
    volumes:
      - tuition-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: tuition-finder-redis
    ports:
      # LAN-exposed per request. NO password is set — anyone on the network
      # can read/flush the refresh-token whitelist. Lock down before any
      # untrusted network use (see warning at bottom of file).
      - "6379:6379"
    volumes:
      - tuition-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  tuition-mongo-data:
    external: true
  tuition-redis-data:
